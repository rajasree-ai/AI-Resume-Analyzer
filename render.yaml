# render.yaml
services:
  - type: web
    name: resume-ai
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      cd backend && python run.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0